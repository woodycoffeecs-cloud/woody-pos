@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=Syne:wght@700;800&display=swap');
:root{--cr:#F9F7DC;--cr2:#EEE9C8;--dk:#2C3A1E;--gn:#618943;--gl:#82AA57;--gp:#82AA5720;--gol:#C8A84B22;--rd:#C0392B;--rl:#FDECEA;--gy:#6B7A5A;--gl2:#E8EDDA;--w:#FEFFFE;--sh:0 2px 16px rgba(97,137,67,.12);--shl:0 8px 36px rgba(97,137,67,.20);}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--cr2);color:var(--dk);min-height:100vh;font-size:14px;}
#ls{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--gn);}
.lb{background:var(--cr);border-radius:24px;padding:44px 38px 36px;width:370px;text-align:center;box-shadow:var(--shl);}
.ll{font-family:'TN',serif;font-size:46px;color:var(--gn);margin-bottom:4px;}
.lsb{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gy);margin-bottom:24px;}
.pd{letter-spacing:14px;font-size:26px;font-weight:700;color:var(--gn);min-height:38px;margin:14px 0;}
.np{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin:14px 0;}
.np button{padding:15px;font-size:17px;font-weight:600;background:var(--w);border:2px solid var(--gl2);border-radius:12px;cursor:pointer;transition:all .15s;color:var(--dk);}
.np button:hover{background:var(--gp);border-color:var(--gn);color:var(--gn);}
.np button:active{transform:scale(.95);}
.lerr{color:var(--rd);font-size:13px;margin-top:8px;min-height:18px;}
#app{display:none;flex-direction:column;min-height:100vh;}
.tb{background:var(--gn);padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(97,137,67,.25);}
.tbl{font-family:'TN',serif;font-size:22px;color:var(--cr);display:flex;align-items:center;gap:10px;}
.tbc{color:var(--cr);font-size:13px;opacity:.85;}
.tbr{display:flex;align-items:center;gap:12px;}
.sbg{background:rgba(249,247,220,.18);color:var(--cr);padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600;border:1px solid rgba(249,247,220,.3);}
.tlo{background:none;border:1px solid rgba(249,247,220,.35);color:var(--cr);opacity:.8;padding:5px 13px;border-radius:8px;cursor:pointer;font-size:13px;transition:all .2s;}
.tlo:hover{opacity:1;background:rgba(249,247,220,.15);}
.nt{background:var(--cr);border-bottom:2px solid var(--gl2);display:flex;padding:0 16px;overflow-x:auto;}
.nt::-webkit-scrollbar{display:none;}
.ntb{padding:13px 16px;font-weight:600;font-size:14px;border:none;background:none;cursor:pointer;color:var(--gy);border-bottom:3px solid transparent;margin-bottom:-2px;transition:all .2s;white-space:nowrap;}
.ntb.on{color:var(--gn);border-bottom-color:var(--gn);font-weight:700;}
.mn{flex:1;padding:20px;max-width:1400px;margin:0 auto;width:100%;}
.pg{display:none;}.pg.on{display:block;}
.st{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:16px;display:flex;align-items:center;gap:8px;}
.ol{display:grid;grid-template-columns:1fr 400px;gap:20px;align-items:start;}
.cp{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.cpl{padding:6px 16px;border-radius:20px;border:2px solid var(--gl2);background:var(--w);cursor:pointer;font-weight:600;font-size:13px;color:var(--gy);transition:all .2s;}
.cpl.on{background:var(--gn);border-color:var(--gn);color:var(--w);}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(148px,1fr));gap:10px;}
.mi{background:var(--cr);border-radius:14px;padding:13px;cursor:pointer;transition:all .2s;border:2px solid transparent;box-shadow:var(--sh);}
.mi:hover{border-color:var(--gn);transform:translateY(-2px);box-shadow:var(--shl);}
.mn2{font-weight:600;font-size:13px;margin-bottom:6px;line-height:1.3;}
.mip{display:flex;gap:6px;flex-wrap:wrap;}
.pb{background:var(--gp);color:var(--gn);padding:2px 8px;border-radius:6px;font-size:12px;font-weight:600;}
.mic{font-size:11px;color:var(--gy);margin-top:5px;}
.cp2{background:var(--cr);border-radius:16px;padding:18px;box-shadow:var(--shl);position:sticky;top:78px;max-height:calc(100vh - 98px);overflow-y:auto;border:1.5px solid var(--gl2);}
.fl{font-size:11px;font-weight:700;color:var(--gy);text-transform:uppercase;letter-spacing:.5px;margin-bottom:5px;}
.ci{width:100%;padding:9px 12px;border:2px solid var(--gl2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;background:var(--w);margin-bottom:10px;}
.ci:focus{border-color:var(--gn);}
.qrs{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:10px;}
.qro{padding:8px 6px;border:2px solid var(--gl2);border-radius:10px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;color:var(--gy);transition:all .2s;background:var(--w);}
.qro.on{border-color:var(--gn);background:var(--gp);color:var(--gn);}
.qro.off{opacity:.4;cursor:not-allowed;}
select.psel{width:100%;padding:9px 12px;border:2px solid var(--gl2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;background:var(--w);margin-bottom:10px;cursor:pointer;}
select.psel.on{border-color:var(--rd);background:var(--rl);color:var(--rd);}
.cit{max-height:220px;overflow-y:auto;margin-bottom:10px;}
.citem{display:flex;align-items:flex-start;gap:8px;padding:9px 0;border-bottom:1px solid var(--gl2);}
.citem:last-child{border-bottom:none;}
.cii{flex:1;}
.cin{font-weight:600;font-size:13px;}
.cid{font-size:12px;color:var(--gy);margin-top:2px;}
.cip{font-weight:700;color:var(--gn);font-size:14px;white-space:nowrap;}
.crm{background:var(--rl);border:none;color:var(--rd);width:24px;height:24px;border-radius:6px;cursor:pointer;font-size:16px;line-height:24px;text-align:center;flex-shrink:0;}
.crm:hover{background:var(--rd);color:var(--w);}
.cem{text-align:center;color:var(--gy);padding:24px 0;font-size:13px;}
.ctr{display:flex;justify-content:space-between;padding:4px 0;font-size:13px;}
.ctr.disc{color:var(--rd);}
.ctr.grd{border-top:2px solid var(--dk);margin-top:8px;padding-top:10px;font-family:'Syne',sans-serif;font-size:17px;font-weight:700;}
.btn{padding:11px 18px;border-radius:12px;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;font-weight:600;font-size:14px;transition:all .2s;display:inline-flex;align-items:center;gap:6px;justify-content:center;}
.bp{background:var(--gn);color:var(--w);width:100%;}.bp:hover{background:var(--gl);}
.bs{background:var(--gl2);color:var(--dk);}.bs:hover{background:#ccc;}
.bd{background:var(--rl);color:var(--rd);}.bd:hover{background:var(--rd);color:var(--w);}
.bg{background:#C8A84B;color:var(--w);}.bg:hover{background:#a8882b;}
.sm{padding:7px 13px;font-size:13px;border-radius:8px;}
.mo{display:none;position:fixed;inset:0;background:rgba(0,0,0,.52);z-index:200;align-items:center;justify-content:center;backdrop-filter:blur(4px);}
.mo.on{display:flex;}
.md{background:var(--cr);border-radius:20px;padding:26px;width:430px;max-width:95vw;box-shadow:var(--shl);animation:mIn .2s ease;max-height:90vh;overflow-y:auto;border:1.5px solid var(--gl2);}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px);}to{opacity:1;transform:scale(1) translateY(0);}}
.mdt{font-family:'Syne',sans-serif;font-weight:700;font-size:18px;margin-bottom:18px;}
.szb{display:grid;grid-template-columns:1fr 1fr;gap:11px;margin-bottom:18px;}
.szbt{padding:15px;border-radius:14px;border:2px solid var(--gl2);background:var(--w);cursor:pointer;text-align:center;transition:all .2s;}
.szbt.on{border-color:var(--gn);background:var(--gp);}
.szl{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--gn);}
.szp{font-size:13px;color:var(--gy);margin-top:3px;}
.ads{margin-bottom:14px;}
.adt{font-weight:600;font-size:13px;color:var(--gy);margin-bottom:8px;}
.ado{display:flex;flex-wrap:wrap;gap:8px;}
.aop{padding:6px 14px;border-radius:20px;border:2px solid var(--gl2);background:var(--w);cursor:pointer;font-size:13px;transition:all .2s;}
.aop.on{border-color:#C8A84B;background:#F0E4B833;}
.mac{display:flex;gap:10px;margin-top:6px;}
.mac .btn{flex:1;}
.otb{display:flex;gap:10px;align-items:center;margin-bottom:14px;flex-wrap:wrap;}
.otb input,.otb select{padding:8px 12px;border:2px solid var(--gl2);border-radius:10px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;background:var(--w);}
.ot{width:100%;border-collapse:collapse;background:var(--cr);border-radius:14px;overflow:hidden;box-shadow:var(--sh);border:1.5px solid var(--gl2);}
.ot th{background:var(--gn);color:var(--cr);padding:11px 12px;text-align:left;font-size:12px;font-weight:700;}
.ot td{padding:10px 12px;border-bottom:1px solid var(--gl2);font-size:13px;}
.ot tr:last-child td{border-bottom:none;}
.ot tr:hover td{background:var(--gp);}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:14px;margin-bottom:20px;}
.sc{background:var(--cr);border-radius:16px;padding:18px;box-shadow:var(--sh);border:1.5px solid var(--gl2);}
.slb{font-size:11px;color:var(--gy);font-weight:700;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;}
.sv{font-family:'Syne',sans-serif;font-size:24px;font-weight:800;}
.ssb{font-size:12px;color:var(--gy);margin-top:4px;}
.sr{background:var(--cr);border-radius:16px;padding:18px;box-shadow:var(--sh);margin-bottom:16px;border:1.5px solid var(--gl2);}
.ap{background:var(--cr);border-radius:16px;padding:18px;box-shadow:var(--sh);border:1.5px solid var(--gl2);}
.ag{display:grid;grid-template-columns:1fr 1fr;gap:18px;}
.mt{width:100%;border-collapse:collapse;}
.mt th{padding:9px 10px;text-align:left;font-size:11px;font-weight:700;color:var(--gy);text-transform:uppercase;border-bottom:2px solid var(--gl2);}
.mt td{padding:7px 9px;border-bottom:1px solid var(--gl2);font-size:13px;}
.mt tr:last-child td{border-bottom:none;}
.mt input{width:64px;padding:4px 6px;border:1px solid var(--gl2);border-radius:6px;font-size:12px;text-align:right;font-family:'DM Sans',sans-serif;outline:none;}
.mt input:focus{border-color:var(--gn);}
.mt input.ni{width:100px;text-align:left;}
.qrg{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:14px;}
.qrc{border:1.5px solid var(--gl2);border-radius:14px;padding:16px;background:var(--cr2);}
.qrpv{width:120px;height:120px;border:1.5px dashed var(--gn);border-radius:10px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;overflow:hidden;background:var(--w);}
.qrpv img{width:100%;height:100%;object-fit:contain;}
.qrf{margin-bottom:9px;}
.qrf label{display:block;font-size:11px;font-weight:700;color:var(--gy);margin-bottom:3px;text-transform:uppercase;}
.qrf input{width:100%;padding:8px 10px;border:2px solid var(--gl2);border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;background:var(--w);}
.qrf input:focus{border-color:var(--gn);}
.qrf input[type=file]{padding:6px 8px;font-size:12px;}
.pc{padding:6px 16px;border-radius:20px;border:2px solid var(--gl2);background:var(--w);cursor:pointer;font-weight:600;font-size:13px;color:var(--gy);transition:all .2s;}
.pc.on{background:var(--gn);border-color:var(--gn);color:var(--w);}
.rg{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:16px;}
.rc{background:var(--cr);border-radius:16px;padding:18px;box-shadow:var(--sh);border:1.5px solid var(--gl2);}
.rct{font-family:'Syne',sans-serif;font-weight:700;font-size:15px;margin-bottom:12px;display:flex;justify-content:space-between;align-items:center;}
.rt{width:100%;border-collapse:collapse;font-size:13px;}
.rt th{text-align:left;padding:6px 8px;font-size:11px;font-weight:700;color:var(--gy);text-transform:uppercase;border-bottom:2px solid var(--gl2);}
.rt td{padding:7px 8px;border-bottom:1px solid var(--gl2);}
.rt tr:last-child td{border-bottom:none;}
.rt input{border:1px solid var(--gl2);border-radius:6px;padding:3px 6px;font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:80px;}
.rt input:focus{border-color:var(--gn);}
.rn{margin-top:8px;font-size:12px;color:var(--gy);font-style:italic;}
.inv-stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:18px;}
.is{background:var(--cr);border-radius:14px;padding:14px 16px;box-shadow:var(--sh);border:1.5px solid var(--gl2);}
.isl{font-size:11px;color:var(--gy);font-weight:700;text-transform:uppercase;margin-bottom:6px;}
.isv{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;}
.ifg{display:grid;grid-template-columns:2fr 1fr 1fr 1fr 1fr auto;gap:8px;align-items:flex-end;margin-bottom:8px;}
.ifg input,.ifg select{padding:8px 10px;border:2px solid var(--gl2);border-radius:9px;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;background:var(--w);width:100%;}
.ifg input:focus,.ifg select:focus{border-color:var(--gn);}
.tb-opex{background:#E8F5E9;color:#2E7D32;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.tb-capex{background:#E3F2FD;color:#1565C0;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;}
.promo-card{background:var(--cr);border:1.5px solid var(--gl2);border-radius:12px;padding:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center;}
.promo-card.off{opacity:.55;}
.ptb{padding:2px 8px;border-radius:6px;font-size:11px;font-weight:700;background:var(--gp);color:var(--gn);margin-left:6px;}
.sdot{width:8px;height:8px;border-radius:50%;background:#4caf50;display:inline-block;animation:pulse 2s infinite;}
.sdot.off{background:#f44336;animation:none;}
@keyframes pulse{0%,100%{opacity:1;}50%{opacity:.4;}}
.tc{position:fixed;top:68px;right:18px;z-index:999;display:flex;flex-direction:column;gap:8px;pointer-events:none;}
.tst{background:var(--dk);color:var(--w);padding:11px 18px;border-radius:12px;font-size:13px;font-weight:500;box-shadow:var(--shl);animation:tIn .3s ease;border-left:4px solid var(--gn);}
.tst.err{border-left-color:var(--rd);}.tst.gld{border-left-color:#C8A84B;}
@keyframes tIn{from{opacity:0;transform:translateX(20px);}to{opacity:1;transform:translateX(0);}}
::-webkit-scrollbar{width:5px;height:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--gl2);border-radius:3px;}
@media(max-width:900px){.ol,.ag,.qrg,.ifg{grid-template-columns:1fr;}.cp2{position:static;max-height:none;}}
@media print{body>*:not(#pra){display:none!important;}#pra{display:block!important;}@page{margin:0;size:80mm auto;}}
#pra{display:none;}
</style>
</head>

let _db = null;

async function initSDK() {
  if (_db) return _db;
  // Load Firebase SDK từ CDN
  const { initializeApp } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js');
  const {
    getFirestore, doc, collection, setDoc, getDoc,
    onSnapshot, getDocs, query, where, deleteDoc, writeBatch
  } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js');

  const app = initializeApp(FB_CFG);
  _db = getFirestore(app);
  _firebase = { doc, collection, setDoc, getDoc, onSnapshot, getDocs, query, where, deleteDoc, writeBatch };
  return _db;
}

async function fbGet(col, id) {
  const db = await initSDK();
  const { doc, getDoc } = _firebase;
  const snap = await getDoc(doc(db, col, id));
  return snap.exists() ? snap.data() : null;
}

async function fbSet(col, id, data) {
  const db = await initSDK();
  const { doc, setDoc } = _firebase;
  await setDoc(doc(db, col, id), data);
}

async function fbQuery(col, filters = []) {
  const db = await initSDK();
  const { collection, query, where, getDocs } = _firebase;
  let q = collection(db, col);
  if (filters.length > 0) {
    q = query(q, ...filters.map(f => where(f.f, '==', f.v)));
  }
  const snap = await getDocs(q);
  return snap.docs.map(d => d.data());
}

async function fbDel(col, id) {
  const db = await initSDK();
  const { doc, deleteDoc } = _firebase;
  await deleteDoc(doc(db, col, id));
}

function fbWatch(col, id, cb) {
  // Start watching after SDK loads
  initSDK().then(db => {
    const { doc, onSnapshot } = _firebase;
    onSnapshot(doc(db, col, id), snap => {
      cb(snap.exists() ? snap.data() : null);
    });
  });
  return () => {}; // cleanup noop
}}catch(e){}};

qtyL": "21g"}, {"name": "Sữa tươi", "qtyM": "120ml", "qtyL": "180ml"}, {"name": "Sữa đặc", "qtyM": "15g", "qtyL": "20g"}, {"name": "Ly + nắp + ống hút", "qtyM": "1", "qtyL": "1"}], "note": ""}, {"id": "cappucino", "name": "Cappucino", "sizes": ["M", "L"], "ingredients": [{"name": "Cà phê", "qtyM": "21g", "qtyL": "21g"}, {"name": "Sữa tươi", "qtyM": "200ml", "qtyL": "300ml"}, {"name": "Ly + nắp + ống hút", "qtyM": "1", "qtyL": "1"}], "note": "Foam sữa kỹ"}, {"id": "caramel-machiato", "name": "Caramel Machiato", "sizes": ["M", "L"], "ingredients": [{"name": "Cà phê", "qtyM": "21g", "qtyL": "21g"}, {"name": "Sữa tươi", "qtyM": "140ml", "qtyL": "180ml"}, {"name": "Caramel syrup", "qtyM": "20ml", "qtyL": "30ml"}, {"name": "Sốt caramel", "qtyM": "10ml", "qtyL": "10ml"}, {"name": "Ly + nắp + ống hút", "qtyM": "1", "qtyL": "1"}], "note": "Rót caramel lên trên cùng"}, {"id": "nau", "name": "Nâu Woody", "sizes": ["M", "L"], "ingredients": [{"name": "Cà phê", "qtyM": "21g", "qtyL": "21g"}, {"name": "Sữa đặc", "qtyM": "15g", "qtyL": "20g"}, {"name": "Ly + nắp + ống hút", "qtyM": "1", "qtyL": "1"}], "note": ""}];

let S={menu:[...DM],addons:[...DA],qr:{...DQ},promos:[...DP],recipes:[...DR],pins:{staff:'1234',admin:'0000'},cart:[],qrSel:0,selPromo:null,mItem:null,mSz:null,mAdd:[],orders:[]};

const $=id=>document.getElementById(id);
function fmt(k){return Math.round(k*1000).toLocaleString('vi-VN')+'đ';}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function getShift(d=new Date()){const h=d.getHours();return h>=8&&h<13?1:h>=13&&h<18?2:0;}
function toast(msg,t='ok'){const el=document.createElement('div');el.className='tst'+(t==='err'?' err':t==='gld'?' gld':'');el.textContent=msg;$('tc').appendChild(el);setTimeout(()=>el.remove(),3500);}
function setSynced(v){$('sdot').classList.toggle('off',!v);}

// LOGIN
let pin='';
function pi(d){if(pin.length>=4)return;pin+=d;upPin();if(pin.length===4)setTimeout(doLogin,150);}
function pc(){pin='';upPin();$('lerr').textContent='';}
function upPin(){$('pd').textContent='●'.repeat(pin.length)+'—'.repeat(4-pin.length);}
async function doLogin(){
  if(pin.length!==4)return;
  $('lerr').textContent='⏳ Đang kết nối...';
  try{
    const cfg=await fbGet('config','main');
    if(cfg){S.menu=cfg.menu||DM;S.addons=cfg.addons||DA;S.qr=cfg.qr||DQ;S.promos=cfg.promos||DP;S.recipes=cfg.recipes||DR;S.pins=cfg.pins||{staff:'1234',admin:'0000'};}
    else{await fbSet('config','main',{menu:DM,addons:DA,qr:DQ,promos:DP,recipes:DR,pins:{staff:'1234',admin:'0000'},updatedAt:new Date().toISOString()});}
    if(pin!==S.pins.staff){$('lerr').textContent='❌ PIN không đúng';pin='';upPin();return;}
    pin='';upPin();$('lerr').textContent='';
    $('ls').style.display='none';$('app').style.display='flex';
    initApp();
  }catch(e){$('lerr').textContent='❌ Lỗi kết nối Firebase. Kiểm tra internet và Firestore Rules.';console.error(e);pin='';upPin();}
}
function logout(){$('ls').style.display='flex';$('app').style.display='none';S.cart=[];S.selPromo=null;S.qrSel=0;pin='';upPin();}

// INIT
function initApp(){
  buildNav('order');buildPills();buildMenu();buildPromoSel();syncQRBtns();
  $('fd').value=today();
  loadOrders();
  tick();setInterval(tick,1000);
  fbWatch('config','main',cfg=>{
    if(!cfg)return;
    S.menu=cfg.menu||S.menu;S.addons=cfg.addons||S.addons;
    S.qr=cfg.qr||S.qr;S.promos=cfg.promos||S.promos;S.recipes=cfg.recipes||S.recipes;
    buildPills();buildMenu();buildPromoSel();syncQRBtns();setSynced(true);
  });
  setSynced(true);
}

function buildNav(active){
  const tabs=[['order','📋 Nhập đơn'],['orders','📜 Đơn hôm nay'],['recipe','📖 Công thức']];
  $('nt').innerHTML=tabs.map(([id,l])=>`<button class="ntb${id===active?' on':''}" onclick="goTo('${id}')">${l}</button>`).join('');
}
function goTo(id){
  document.querySelectorAll('.pg').forEach(p=>p.classList.remove('on'));
  $('pg-'+id).classList.add('on');
  document.querySelectorAll('.ntb').forEach(b=>b.classList.toggle('on',b.textContent.trim()===({order:'📋 Nhập đơn',orders:'📜 Đơn hôm nay',recipe:'📖 Công thức'})[id]));
  if(id==='orders')loadOrders();
  if(id==='recipe')buildRecipes();
}
function tick(){
  const n=new Date(),h=n.getHours(),m=n.getMinutes();
  $('ttm').textContent=`🕐 ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;
  const s=h>=8&&h<13?1:h>=13&&h<18?2:0;
  $('sbg').textContent=s===1?'Ca 1 (8h–13h)':s===2?'Ca 2 (13h–18h)':'Ngoài ca';
}

// MENU
let curCat='all';
function buildPills(){
  const cats=['all',...new Set(S.menu.map(i=>i.cat))];
  $('cp').innerHTML=cats.map(c=>`<button class="cpl${c===curCat?' on':''}" onclick="setCat('${c}',this)">${c==='all'?'Tất cả':c}</button>`).join('');
}
function setCat(c,el){curCat=c;document.querySelectorAll('.cpl').forEach(b=>b.classList.remove('on'));el.classList.add('on');buildMenu();}
function buildMenu(){
  const items=curCat==='all'?S.menu:S.menu.filter(i=>i.cat===curCat);
  $('mg').innerHTML=items.map(i=>`<div class="mi" onclick="openMo(${i.id})"><div class="mn2">${i.name}</div><div class="mip">${i.pm?`<span class="pb">M: ${i.pm}k</span>`:''}${i.pl?`<span class="pb">L: ${i.pl}k</span>`:''}</div><div class="mic">${i.cat}</div></div>`).join('');
}

// MODAL
function openMo(id){
  const item=S.menu.find(i=>i.id===id);if(!item)return;
  S.mItem=item;S.mSz=null;S.mAdd=[];
  $('mdt').textContent=item.name;
  const szs=[];if(item.pm)szs.push(['M',item.pm]);if(item.pl)szs.push(['L',item.pl]);
  $('szb').innerHTML=szs.map(([s,p])=>`<div class="szbt" id="sz${s}" onclick="selSz('${s}')"><div class="szl">${s}</div><div class="szp">${p}k</div></div>`).join('');
  if(szs.length===1)selSz(szs[0][0]);
  const syr=S.addons.filter(a=>a.type==='syrup');
  $('syrs').style.display=syr.length?'':'none';
  $('syro').innerHTML=syr.map(a=>`<div class="aop" id="ao${a.id}" onclick="togAd(${a.id})">${a.name} <span style="font-size:11px;color:var(--gy)">+${a.price}k</span></div>`).join('');
  const top=S.addons.filter(a=>a.type==='topping');
  $('tops').style.display=top.length?'':'none';
  $('topo').innerHTML=top.map(a=>`<div class="aop" id="ao${a.id}" onclick="togAd(${a.id})">${a.name} <span style="font-size:11px;color:var(--gy)">+${a.price}k</span></div>`).join('');
  $('mo').classList.add('on');
}
function selSz(s){S.mSz=s;document.querySelectorAll('.szbt').forEach(b=>b.classList.remove('on'));$('sz'+s)?.classList.add('on');}
function togAd(id){const i=S.mAdd.indexOf(id);i>-1?S.mAdd.splice(i,1):S.mAdd.push(id);$('ao'+id)?.classList.toggle('on',S.mAdd.includes(id));}
function closeMo(){$('mo').classList.remove('on');}
function addToCart(){
  if(!S.mSz){toast('Chọn size!','err');return;}
  const it=S.mItem,sz=S.mSz;
  const price=sz==='M'?it.pm:it.pl,cost=sz==='M'?it.cm:it.cl;
  const addons=S.mAdd.map(id=>S.addons.find(a=>a.id===id)).filter(Boolean);
  const ap=addons.reduce((s,a)=>s+a.price,0);
  S.cart.push({id:Date.now(),name:it.name,size:sz,price,cost,addons,ap,ac:addons.reduce((s,a)=>s+a.cost,0),total:price+ap,tc:cost+addons.reduce((s,a)=>s+a.cost,0)});
  buildCart();closeMo();toast(`✓ ${it.name} (${sz})`);
}

// PROMO
function calcTot(cart,promo){
  const sub=cart.reduce((s,i)=>s+i.total,0);
  let disc=0,label='';
  if(promo){if(promo.type==='percent'){disc=sub*promo.val/100;label=`${promo.name} −${promo.val}%`;}else if(promo.type==='fixed'){disc=Math.min(promo.val,sub);label=promo.name;}}
  return{sub,disc,grand:Math.max(0,sub-disc),label};
}
function buildPromoSel(){
  const el=$('psel');if(!el)return;
  const active=(S.promos||[]).filter(p=>p.on);
  el.innerHTML='<option value="">— Không giảm giá —</option>'+active.map(p=>`<option value="${p.id}">${p.name}</option>`).join('');
  el.value=S.selPromo?.id||'';
  el.className='psel'+(S.selPromo?' on':'');
}
function onPC(){
  const v=+$('psel').value;
  S.selPromo=(S.promos||[]).find(p=>p.id===v)||null;
  $('psel').className='psel'+(S.selPromo?' on':'');
  buildCart();
}

// QR
function selQR(n){
  if(n===1&&!S.qr.q1.url){toast('QR 1 chưa cài','err');return;}
  if(n===2&&!S.qr.q2.url){toast('QR 2 chưa cài','err');return;}
  S.qrSel=n;syncQRBtns();
}
function syncQRBtns(){
  const o1=$('qr1'),o2=$('qr2');
  if(o1){o1.textContent=S.qr.q1.label||'QR 1';o1.classList.toggle('off',!S.qr.q1.url);}
  if(o2){o2.textContent=S.qr.q2.label||'QR 2';o2.classList.toggle('off',!S.qr.q2.url);}
  [0,1,2].forEach(n=>document.getElementById('qr'+n)?.classList.toggle('on',S.qrSel===n));
}

// CART
function buildCart(){
  const el=$('cit');
  if(!S.cart.length){el.innerHTML='<div class="cem">Chưa có món nào</div>';$('csum').innerHTML='';return;}
  el.innerHTML=S.cart.map(ci=>`<div class="citem"><div class="cii"><div class="cin">${ci.name} (${ci.size})</div>${ci.addons.length?`<div class="cid">${ci.addons.map(a=>a.name).join(', ')}</div>`:''}<div class="cid">${fmt(ci.price)}${ci.ap?` + ${fmt(ci.ap)}`:''}</div></div><div class="cip">${fmt(ci.total)}</div><button class="crm" onclick="rmCart(${ci.id})">×</button></div>`).join('');
  const{sub,disc,grand,label}=calcTot(S.cart,S.selPromo);
  let h=`<div class="ctr"><span>Tạm tính</span><span>${fmt(sub)}</span></div>`;
  if(disc>0)h+=`<div class="ctr disc"><span>${label}</span><span>−${fmt(disc)}</span></div>`;
  h+=`<div class="ctr grd"><span>THANH TOÁN</span><span style="color:var(--gn)">${fmt(grand)}</span></div>`;
  $('csum').innerHTML=h;
}
function rmCart(id){S.cart=S.cart.filter(i=>i.id!==id);buildCart();}
function clearCart(){S.cart=[];S.selPromo=null;$('cname').value='';buildPromoSel();buildCart();}

async function doOrder(){
  if(!S.cart.length){toast('Giỏ hàng trống!','err');return;}
  const cust=($('cname').value||'').trim()||'Khách lẻ';
  const now=new Date(),ds=today();
  const{sub,disc,grand}=calcTot(S.cart,S.selPromo);
  const ord={id:'ORD-'+Date.now(),customer:cust,items:[...S.cart],sub,disc,promoName:S.selPromo?.name||'',total:grand,totalCost:S.cart.reduce((s,i)=>s+i.tc,0),qrSel:S.qrSel,shift:getShift(now),date:ds,yearMonth:ds.slice(0,7),time:now.toLocaleTimeString('vi-VN',{hour:'2-digit',minute:'2-digit'}),ts:now.getTime()};
  try{
    await fbSet('orders',ord.id,ord);
    printBill(ord);clearCart();toast(`✅ ${ord.id}!`,'gld');
    S.orders.unshift(ord);
    if($('pg-orders').classList.contains('on'))filterOrders();
  }catch(e){toast('❌ Lỗi: '+e.message,'err');}
}

function printBill(ord){
  const qk=ord.qrSel===1?'q1':ord.qrSel===2?'q2':null;
  const qd=qk?S.qr[qk]:null;
  const qH=qd&&qd.url?`<div style="text-align:center;margin:10px 0"><b style="font-size:11px">CHUYỂN KHOẢN</b><div style="font-size:11px;margin:3px 0">${qd.name||qd.label}</div><img src="${qd.url}" style="width:160px;height:160px;object-fit:contain;display:block;margin:0 auto"/></div>`:'<div style="text-align:center;font-size:11px;margin:10px 0">💵 Tiền mặt</div>';
  const bv=k=>Math.round(k*1000).toLocaleString('vi-VN')+'đ';
  const iH=ord.items.map(i=>`<div style="display:flex;justify-content:space-between;padding:2px 0"><span>${i.name} (${i.size})</span><span>${bv(i.price)}</span></div>${i.addons.map(a=>`<div style="display:flex;justify-content:space-between;font-size:11px;color:#666;padding:1px 0 1px 10px"><span>+ ${a.name}</span><span>+${bv(a.price)}</span></div>`).join('')}`).join('');
  const html=`<!DOCTYPE html><html><head><meta charset="UTF-8"><title>${ord.id}</title><style>*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Courier New',monospace;font-size:12px;padding:10px;background:#fff}.w{width:272px;margin:0 auto}.c{text-align:center}.b{font-weight:bold}.row{display:flex;justify-content:space-between;padding:2px 0}.dash{border-top:1px dashed #000;margin:7px 0}.ck{color:#c0392b}@media print{@page{margin:0;size:80mm auto}body{padding:3px}}</style></head><body><div class="w"><div class="c b" style="font-size:17px">WOODY COFFEE</div><div class="c" style="font-size:11px;margin:2px 0">117, 52 St, An Phú, Thủ Đức, TP.HCM</div><div class="c" style="font-size:11px">@woody.coffee_cs | 8:30AM–7:00PM</div><div class="dash"></div><div class="row"><span>${ord.id}</span><span>${ord.date}</span></div><div class="row"><span>Khách: <b>${ord.customer}</b></span><span>${ord.time}</span></div><div style="font-size:11px">Ca: ${ord.shift===1?'Ca 1 (8h–13h)':ord.shift===2?'Ca 2 (13h–18h)':'Ngoài ca'}</div><div class="dash"></div>${iH}<div class="dash"></div><div class="row"><span>Tạm tính</span><span>${bv(ord.sub)}</span></div>${ord.disc>0?`<div class="row ck"><span>${ord.promoName||'KM'}</span><span>-${bv(ord.disc)}</span></div>`:''}<div class="dash"></div><div class="row b" style="font-size:14px"><span>TỔNG CỘNG</span><span>${bv(ord.total)}</span></div><div class="dash"></div>${qH}<div class="dash"></div><div class="c" style="font-size:11px">Cảm ơn bạn đã ghé Woody Coffee!</div><div class="c" style="font-size:11px;margin-top:2px;font-style:italic">More Espresso, Less Depresso ☕</div><div style="height:20px"></div></div><script>window.onload=()=>window.print()<\/script></body></html>`;
  const w=window.open('','_blank','width=400,height=700');
  if(w){w.document.write(html);w.document.close();}else toast('Cho phép popup để in bill','err');
}

// ORDERS
async function loadOrders(){
  const df=$('fd').value||today();
  try{const rows=await fbQuery('orders',[{f:'date',v:df}]);S.orders=rows;filterOrders();setSynced(true);}
  catch(e){toast('Lỗi tải đơn: '+e.message,'err');setSynced(false);}
}
function filterOrders(){
  const sf=$('fs')?.value,q=($('fq')?.value||'').toLowerCase();
  let ords=[...S.orders].sort((a,b)=>b.ts-a.ts);
  if(sf)ords=ords.filter(o=>String(o.shift)===sf);
  if(q)ords=ords.filter(o=>(o.customer||'').toLowerCase().includes(q));
  const tb=$('otb');
  if(!ords.length){tb.innerHTML='<tr><td colspan="9" style="text-align:center;color:var(--gy);padding:28px">Không có đơn nào</td></tr>';return;}
  tb.innerHTML=ords.map((o,i)=>`<tr><td style="color:var(--gy);font-size:12px">${i+1}</td><td>${o.date}<br><span style="font-size:11px;color:var(--gy)">${o.time}</span></td><td style="font-weight:600">${o.customer}</td><td><span style="background:var(--gp);color:var(--gn);padding:2px 7px;border-radius:6px;font-size:11px;font-weight:700">${o.shift===1?'Ca1':o.shift===2?'Ca2':'—'}</span></td><td style="font-size:12px;color:var(--gy);max-width:130px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${(o.items||[]).map(i=>`${i.name}(${i.size})`).join(', ')}</td><td>${fmt(o.sub)}</td><td style="color:var(--rd)">${o.disc>0?`−${fmt(o.disc)}`:'-'}</td><td style="font-weight:700;color:var(--gn)">${fmt(o.total)}</td><td><button class="btn bs sm" style="padding:4px 10px" onclick="rePrint('${o.id}')">🖨</button></td></tr>`).join('');
}
function rePrint(id){const o=S.orders.find(x=>x.id===id);if(o)printBill(o);}

// RECIPE
function buildRecipes(){
  const el=$('rg');if(!el)return;
  el.innerHTML=(S.recipes||DR).map(r=>`<div class="rc"><div class="rct">${r.name}</div><table class="rt"><thead><tr><th>Nguyên liệu</th><th style="text-align:center">Size M</th><th style="text-align:center">Size L</th></tr></thead><tbody>${r.ingredients.map(g=>`<tr><td>${g.name}</td><td style="text-align:center;font-weight:600">${g.qtyM||'—'}</td><td style="text-align:center;font-weight:600">${g.qtyL||'—'}</td></tr>`).join('')}</tbody></table>${r.note?`<div class="rn">📝 ${r.note}</div>`:''}</div>`).join('');
}

</script>
</body>
